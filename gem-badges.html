<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gem Badge Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: "Bungee", sans-serif;
    color: #fff;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 60px 20px;
    flex-wrap: wrap;
  }

  /* Wrapper sizes the badge and hosts the value layer */
  .gem {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  /* Gem image layer */
  .gem img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.5));
  }

  /* Value text overlay — centered over the gem.
     Color is set per-gem; dark multilayer text-shadow keeps it legible
     against the gem surface regardless of hue. */
  .gem .gem-value {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Bungee", sans-serif;
    font-size: 4.875rem;
    letter-spacing: 1px;
    pointer-events: none;
    padding-top: 4px;
  }

  /* Shared: white outline via text-stroke, soft dark drop shadow. */
  .gem .gem-value {
    -webkit-text-stroke: 2px #fff;
    paint-order: stroke fill;
    filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.55));
  }

  /* Per-gem text fill colors (darker shades) */
  .gem.emerald  .gem-value { color: #1b5e20; }
  .gem.sapphire .gem-value { color: #0d3a9e; }
  .gem.amethyst .gem-value { color: #6a1b9a; }
  .gem.topaz    .gem-value { color: #b04400; }

  /* ── Glint ──
     A diagonal highlight sweep that crosses the gem periodically.
     Masked by the gem's own PNG alpha channel — pixel-perfect fit
     to each shape (octagon emerald, cushion sapphire, pear amethyst,
     round topaz) with zero hand-drawn clip-paths. */
  .gem::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(
      115deg,
      transparent 35%,
      rgba(255, 255, 255, 0.0) 45%,
      rgba(255, 255, 255, 0.85) 50%,
      rgba(255, 255, 255, 0.0) 55%,
      transparent 65%
    );
    background-size: 250% 250%;
    background-position: 150% 150%;
    mix-blend-mode: screen;
    mask-size: 100% 100%;
    mask-repeat: no-repeat;
    mask-position: center;
    -webkit-mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    animation: glint-sweep 4.2s ease-in-out infinite;
  }

  .gem.emerald::after  { mask-image: url(emerald.png);  -webkit-mask-image: url(emerald.png); }
  .gem.sapphire::after { mask-image: url(sapphire.png); -webkit-mask-image: url(sapphire.png); }
  .gem.amethyst::after { mask-image: url(amethyst.png); -webkit-mask-image: url(amethyst.png); }
  .gem.topaz::after    { mask-image: url(topaz.png);    -webkit-mask-image: url(topaz.png); }

  .gem.emerald::after  { animation-delay: 0s; }
  .gem.sapphire::after { animation-delay: 1.0s; }
  .gem.amethyst::after { animation-delay: 2.1s; }
  .gem.topaz::after    { animation-delay: 3.1s; }

  @keyframes glint-sweep {
    0%   { background-position: 150% 150%; }
    15%  { background-position: 150% 150%; }
    33%  { background-position: -50% -50%; }
    100% { background-position: -50% -50%; }
  }

  /* ── Sparkles ──
     Small 4-pointed stars that twinkle on and around the gem.
     Count + frequency scale with multiplier tier (more sparkles,
     shorter cycle, higher peak opacity for stronger gems). */
  .sparkle-layer {
    position: absolute;
    inset: -14%;
    pointer-events: none;
  }
  .sparkle {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #fff;
    /* 4-point star via clip-path */
    clip-path: polygon(
      50% 0%, 58% 42%, 100% 50%, 58% 58%,
      50% 100%, 42% 58%, 0% 50%, 42% 42%
    );
    opacity: 0;
    transform: scale(0);
    transform-origin: center;
    filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.9));
    animation: sparkle-twinkle var(--sparkle-cycle, 3.2s) ease-in-out infinite;
    animation-delay: var(--sparkle-delay, 0s);
  }

  @keyframes sparkle-twinkle {
    0%, 100%       { opacity: 0; transform: scale(0) rotate(0deg); }
    8%             { opacity: var(--sparkle-peak, 0.9); transform: scale(1) rotate(45deg); }
    16%            { opacity: 0; transform: scale(0) rotate(90deg); }
    /* Rest of cycle: sparkle stays off so placement reads as intermittent */
  }

  /* Tier-based sparkle intensity.
     - cycle: how long one full twinkle-and-wait loop takes (shorter = more frequent)
     - peak: max opacity of each flash (brighter = more dazzle) */
  .gem.emerald  { --sparkle-cycle: 4.5s; --sparkle-peak: 0.75; }
  .gem.sapphire { --sparkle-cycle: 3.8s; --sparkle-peak: 0.85; }
  .gem.amethyst { --sparkle-cycle: 3.2s; --sparkle-peak: 0.95; }
  .gem.topaz    { --sparkle-cycle: 2.6s; --sparkle-peak: 1.0; }

  /* Per-sparkle positioning + delay — hand-placed to sit on/near the gem
     in visually pleasing spots. Delays are spaced within the cycle so
     sparkles don't all flash at once. */
  .sparkle.s1  { top: 14%; left: 22%; --sparkle-delay: 0.0s;  width: 12px; height: 12px; }
  .sparkle.s2  { top: 32%; left: 78%; --sparkle-delay: 0.9s;  width: 16px; height: 16px; }
  .sparkle.s3  { top: 68%; left: 18%; --sparkle-delay: 1.8s;  width: 10px; height: 10px; }
  .sparkle.s4  { top: 78%; left: 74%; --sparkle-delay: 2.4s;  width: 14px; height: 14px; }
  .sparkle.s5  { top: 8%;  left: 62%; --sparkle-delay: 0.4s;  width: 18px; height: 18px; }
  .sparkle.s6  { top: 88%; left: 40%; --sparkle-delay: 1.4s;  width: 12px; height: 12px; }
  .sparkle.s7  { top: 50%; left: 4%;  --sparkle-delay: 0.25s; width: 14px; height: 14px; }
  .sparkle.s8  { top: 46%; left: 92%; --sparkle-delay: 2.9s;  width: 12px; height: 12px; }
  .sparkle.s9  { top: 22%; left: 48%; --sparkle-delay: 1.1s;  width: 10px; height: 10px; }
  .sparkle.s10 { top: 58%; left: 56%; --sparkle-delay: 0.6s;  width: 16px; height: 16px; }
  .sparkle.s11 { top: 72%; left: 36%; --sparkle-delay: 2.0s;  width: 12px; height: 12px; }
  .sparkle.s12 { top: 18%; left: 84%; --sparkle-delay: 0.15s; width: 14px; height: 14px; }
  .sparkle.s13 { top: 86%; left: 12%; --sparkle-delay: 1.55s; width: 10px; height: 10px; }
  .sparkle.s14 { top: 4%;  left: 38%; --sparkle-delay: 2.3s;  width: 18px; height: 18px; }
  .sparkle.s15 { top: 64%; left: 86%; --sparkle-delay: 0.75s; width: 12px; height: 12px; }

  /* Label under each gem for the test layout */
  .test-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .test-label {
    font-family: "Bungee", sans-serif;
    font-size: 0.9rem;
    color: #999;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

  <div class="test-col">
    <div class="gem emerald">
      <img src="emerald.png" alt="Emerald" />
      <div class="sparkle-layer">
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
      </div>
      <div class="gem-value">1.5x</div>
    </div>
    <div class="test-label">EMERALD</div>
  </div>

  <div class="test-col">
    <div class="gem sapphire">
      <img src="sapphire.png" alt="Sapphire" />
      <div class="sparkle-layer">
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
      </div>
      <div class="gem-value">2x</div>
    </div>
    <div class="test-label">SAPPHIRE</div>
  </div>

  <div class="test-col">
    <div class="gem amethyst">
      <img src="amethyst.png" alt="Amethyst" />
      <div class="sparkle-layer">
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <div class="sparkle s5"></div>
        <div class="sparkle s6"></div>
        <div class="sparkle s7"></div>
        <div class="sparkle s8"></div>
      </div>
      <div class="gem-value">2.5x</div>
    </div>
    <div class="test-label">AMETHYST</div>
  </div>

  <div class="test-col">
    <div class="gem topaz">
      <img src="topaz.png" alt="Topaz" />
      <div class="sparkle-layer">
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <div class="sparkle s5"></div>
        <div class="sparkle s6"></div>
        <div class="sparkle s7"></div>
        <div class="sparkle s8"></div>
        <div class="sparkle s9"></div>
        <div class="sparkle s10"></div>
        <div class="sparkle s11"></div>
        <div class="sparkle s12"></div>
        <div class="sparkle s13"></div>
        <div class="sparkle s14"></div>
        <div class="sparkle s15"></div>
      </div>
      <div class="gem-value">3x</div>
    </div>
    <div class="test-label">TOPAZ</div>
  </div>

</body>
</html>
