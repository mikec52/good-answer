<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Is Correct — Prototype</title>
<link rel="stylesheet" href="https://use.typekit.net/lps4irc.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'futura-100', sans-serif;
    color: #fff;
  }

  #game-root {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #111;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* --- Scalable canvas --- */
  #scale-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }

  /* --- SVG blob background (matches feud.html) --- */
  #bg-blobs {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* --- Top bar --- */
  #top-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 10px;
    background: rgba(17,17,17,0.85);
    border-bottom: 1px solid #333;
  }

  #top-bar .module-label {
    font-family: 'dazzle-unicase', sans-serif;
    font-size: 1.1rem;
    color: #fba300;
    letter-spacing: 0.08em;
  }

  #top-bar .scores {
    display: flex;
    gap: 24px;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
  }

  .score-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border-radius: 20px;
    padding: 4px 14px;
  }
  .score-pill .team-name { opacity: 0.7; }
  .score-pill .team-pts  { font-size: 1.1rem; font-weight: 700; }
  .score-pill.red  .team-pts { color: #ff5555; }
  .score-pill.blue .team-pts { color: #4c8cff; }

  /* --- Main stage --- */
  #stage {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px 60px;
  }

  /* --- Question card --- */
  #question-card {
    width: 100%;
    max-width: 820px;
    background: #1a1a1a;
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
  }

  #question-category {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    color: #fba300;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  #question-text {
    font-size: 1.6rem;
    line-height: 1.4;
    color: #fff;
  }

  /* --- Answer reveal area --- */
  #answer-reveal {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-height: 80px;
  }

  #answer-label {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: #888;
    text-transform: uppercase;
  }

  #answer-value {
    font-family: 'video', monospace;
    font-size: 4rem;
    color: #fba300;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #answer-value.visible { opacity: 1; }

  /* --- Player guess rows --- */
  #guess-rows {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .guess-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #1a1a1a;
    border-radius: 10px;
    padding: 12px 20px;
    border: 2px solid transparent;
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .guess-row.active  { border-color: #fba300; }
  .guess-row.correct { background: #1b3a1b; border-color: #4caf50; }
  .guess-row.over    { background: #3a1a1a; border-color: #ff5555; opacity: 0.6; }

  .guess-row .player-name {
    flex: 1;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
  }
  .guess-row.red  .player-name { color: #ff5555; }
  .guess-row.blue .player-name { color: #4c8cff; }

  .guess-row input.guess-input {
    width: 180px;
    background: #111;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 8px 12px;
    color: #fff;
    font-family: 'video', monospace;
    font-size: 1.3rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .guess-row input.guess-input:focus { border-color: #fba300; }
  .guess-row input.guess-input:disabled { background: #1a1a1a; color: #666; }

  .guess-row .guess-locked {
    width: 180px;
    font-family: 'video', monospace;
    font-size: 1.6rem;
    text-align: center;
    color: #fff;
    display: none;
  }
  .guess-row .guess-locked.visible { display: block; }

  .guess-row .diff-label {
    width: 80px;
    text-align: right;
    font-size: 0.85rem;
    font-family: 'video', monospace;
    color: #888;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .guess-row .diff-label.visible { opacity: 1; }
  .guess-row.correct .diff-label { color: #4caf50; }
  .guess-row.over    .diff-label { color: #ff5555; }

  .guess-row .submit-btn {
    background: #fba300;
    color: #111;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-family: 'futura-100', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .guess-row .submit-btn:hover { opacity: 0.85; }
  .guess-row .submit-btn:disabled { opacity: 0.35; cursor: default; }

  /* --- Bottom controls --- */
  #bottom-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 16px 24px;
    background: rgba(17,17,17,0.85);
    border-top: 1px solid #333;
  }

  .ctrl-btn {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 9px 24px;
    font-family: 'futura-100', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.07em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .ctrl-btn:hover { background: #2e2e2e; border-color: #666; }
  .ctrl-btn.primary { background: #fba300; color: #111; border-color: #fba300; }
  .ctrl-btn.primary:hover { background: #e09500; }
  .ctrl-btn:disabled { opacity: 0.35; cursor: default; }

  /* --- Perspective toggle (dev) --- */
  #perspective-toggle {
    position: absolute;
    bottom: 10px;
    right: 16px;
    z-index: 20;
    font-size: 0.7rem;
    color: #555;
    cursor: pointer;
    letter-spacing: 0.08em;
    user-select: none;
  }
  #perspective-toggle:hover { color: #888; }

  /* --- Version tag --- */
  #version-tag {
    position: absolute;
    top: 6px;
    left: 10px;
    z-index: 100;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.25);
    pointer-events: none;
    font-family: 'Bitcount Mono Single', monospace;
  }
</style>
</head>
<body>
<div id="scale-wrapper">
<div id="game-root">

  <span id="version-tag">NIC prototype</span>

  <!-- Background blobs (simplified) -->
  <svg id="bg-blobs" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="blob-blur"><feGaussianBlur stdDeviation="60"/></filter>
    </defs>
    <g filter="url(#blob-blur)" opacity="0.55">
      <ellipse cx="200"  cy="200"  rx="260" ry="200" fill="#0000c0"/>
      <ellipse cx="1080" cy="500"  rx="280" ry="220" fill="#990b0b"/>
      <ellipse cx="700"  cy="400"  rx="200" ry="160" fill="#053977" opacity="0.6"/>
    </g>
  </svg>

  <!-- Top bar: module label + running scores -->
  <div id="top-bar">
    <span class="module-label">Number Is Correct</span>
    <div class="scores">
      <div class="score-pill red">
        <span class="team-name" id="red-name">Red Team</span>
        <span class="team-pts"  id="red-score">0</span>
      </div>
      <div class="score-pill blue">
        <span class="team-name" id="blue-name">Blue Team</span>
        <span class="team-pts"  id="blue-score">0</span>
      </div>
    </div>
  </div>

  <!-- Main stage -->
  <div id="stage">

    <!-- Question -->
    <div id="question-card">
      <div id="question-category">General Knowledge</div>
      <div id="question-text">How many hot dogs are consumed in the United States each year (in billions)?</div>
    </div>

    <!-- Answer reveal (hidden until shown) -->
    <div id="answer-reveal">
      <div id="answer-label">The answer is</div>
      <div id="answer-value">20</div>
    </div>

    <!-- One row per player/team -->
    <div id="guess-rows">
      <!-- Rows injected by JS -->
    </div>

  </div>

  <!-- Bottom controls -->
  <div id="bottom-bar">
    <button class="ctrl-btn" onclick="resetRound()">New Question</button>
    <button class="ctrl-btn primary" id="reveal-btn" onclick="revealAnswer()">Reveal Answer</button>
  </div>

  <div id="perspective-toggle" onclick="cyclePerspective()">[ perspective: HOST ]</div>

</div>
</div>

<script>
// ─── Prototype state ───────────────────────────────────────────────────────
const PLAYERS = [
  { name: 'Alice',   team: 'red',  color: '#ff5555' },
  { name: 'Bob',     team: 'red',  color: '#ff5555' },
  { name: 'Carol',   team: 'blue', color: '#4c8cff' },
  { name: 'Dave',    team: 'blue', color: '#4c8cff' },
];

// placeholder question bank — replace with real NIC question set
const QUESTIONS = [
  { text: 'How many hot dogs are consumed in the United States each year (in billions)?', category: 'Food & Drink', answer: 20 },
  { text: 'In what year was the first iPhone released?', category: 'Technology', answer: 2007 },
  { text: 'How many bones are in the adult human body?', category: 'Science', answer: 206 },
  { text: 'What is the height of the Eiffel Tower in meters?', category: 'Geography', answer: 330 },
  { text: 'How many keys does a standard piano have?', category: 'Music', answer: 88 },
];

let currentQ   = null;
let revealed   = false;
let perspective = 'host'; // host | red | blue | guesser

// ─── Scalable canvas ──────────────────────────────────────────────────────
function scaleCanvas() {
  const root = document.getElementById('game-root');
  const scaleX = window.innerWidth  / 1280;
  const scaleY = window.innerHeight / 720;
  const scale  = Math.min(scaleX, scaleY);
  root.style.transform       = `scale(${scale})`;
  root.style.transformOrigin = 'center center';
}
window.addEventListener('resize', scaleCanvas);
scaleCanvas();

// ─── Build guess rows ─────────────────────────────────────────────────────
function buildRows() {
  const container = document.getElementById('guess-rows');
  container.innerHTML = '';
  PLAYERS.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = `guess-row ${p.team}`;
    row.dataset.idx = i;
    row.innerHTML = `
      <span class="player-name">${p.name}</span>
      <input class="guess-input" type="number" min="0" placeholder="your guess"
             onkeydown="handleKey(event, ${i})" />
      <div class="guess-locked"></div>
      <div class="diff-label"></div>
      <button class="submit-btn" onclick="lockGuess(${i})">Lock In</button>
    `;
    container.appendChild(row);
  });
}

// ─── Input handling ────────────────────────────────────────────────────────
function handleKey(e, idx) {
  if (e.key === 'Enter') lockGuess(idx);
}

function lockGuess(idx) {
  const row   = document.querySelector(`.guess-row[data-idx="${idx}"]`);
  const input = row.querySelector('.guess-input');
  const val   = input.value.trim();
  if (!val || isNaN(+val)) return;

  const locked = row.querySelector('.guess-locked');
  const btn    = row.querySelector('.submit-btn');

  input.disabled   = true;
  btn.disabled     = true;
  locked.textContent = Number(val).toLocaleString();
  locked.classList.add('visible');
  input.style.display = 'none';
  row.classList.add('active');
  row.dataset.guess = val;
}

// ─── Reveal ────────────────────────────────────────────────────────────────
function revealAnswer() {
  if (!currentQ || revealed) return;
  revealed = true;

  const answerEl = document.getElementById('answer-value');
  answerEl.classList.add('visible');
  document.getElementById('reveal-btn').disabled = true;

  const answer = currentQ.answer;

  document.querySelectorAll('.guess-row').forEach(row => {
    const rawGuess = row.dataset.guess;
    if (rawGuess === undefined) return;

    const guess = +rawGuess;
    const diff  = answer - guess;
    const diffEl = row.querySelector('.diff-label');

    if (guess > answer) {
      row.classList.add('over');
      diffEl.textContent = `▲ ${(guess - answer).toLocaleString()} over`;
    } else if (diff === 0) {
      row.classList.remove('active');
      row.classList.add('correct');
      diffEl.textContent = 'Exact!';
    } else {
      row.classList.remove('active');
      row.classList.add('correct');
      diffEl.textContent = `+${diff.toLocaleString()} away`;
    }
    diffEl.classList.add('visible');
  });
}

// ─── Reset ─────────────────────────────────────────────────────────────────
function resetRound() {
  revealed = false;
  currentQ = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];

  document.getElementById('question-text').textContent     = currentQ.text;
  document.getElementById('question-category').textContent = currentQ.category;

  const answerEl = document.getElementById('answer-value');
  answerEl.textContent = currentQ.answer.toLocaleString();
  answerEl.classList.remove('visible');

  document.getElementById('reveal-btn').disabled = false;
  buildRows();
}

// ─── Perspective toggle (dev helper) ──────────────────────────────────────
const PERSPECTIVES = ['host', 'red', 'blue', 'guesser'];
function cyclePerspective() {
  const idx = PERSPECTIVES.indexOf(perspective);
  perspective = PERSPECTIVES[(idx + 1) % PERSPECTIVES.length];
  document.getElementById('perspective-toggle').textContent =
    `[ perspective: ${perspective.toUpperCase()} ]`;
  // TODO: hide/show appropriate controls per perspective
}

// ─── Init ──────────────────────────────────────────────────────────────────
resetRound();
</script>
</body>
</html>
