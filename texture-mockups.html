<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0a0a0a; padding: 40px; font-family: sans-serif; color: #fff; }
  h2 { margin: 30px 0 8px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
  .swatch {
    width: 600px;
    height: 120px;
    border-radius: 0 0 12px 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bitcount Single', monospace;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  /* 1. Brushed metal — horizontal hairline streaks */
  .brushed-metal {
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0) 1px,
        rgba(255,255,255,0) 3px,
        rgba(255,255,255,0.02) 4px
      ),
      linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 40%, #222 100%);
  }

  /* 2. Carbon fiber — diagonal weave pattern */
  .carbon-fiber {
    background:
      linear-gradient(135deg, rgba(255,255,255,0.04) 25%, transparent 25%),
      linear-gradient(225deg, rgba(255,255,255,0.04) 25%, transparent 25%),
      linear-gradient(315deg, rgba(255,255,255,0.04) 25%, transparent 25%),
      linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%),
      #1a1a1a;
    background-size: 8px 8px;
    background-position: 0 0, 4px 0, 4px -4px, 0 4px;
  }

  /* 3. Stamped/embossed metal — subtle top/bottom bevel + noise */
  .stamped-metal {
    background: linear-gradient(180deg, #2e2e2e 0%, #1c1c1c 5%, #222 50%, #1a1a1a 95%, #2e2e2e 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(255,255,255,0.04);
  }

  /* 4. Dark glass — glossy gradient with subtle reflection */
  .dark-glass {
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.02) 40%,
        transparent 50%,
        rgba(0,0,0,0.15) 100%
      ),
      #1e1e1e;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* 5. Gunmetal gradient — darker warm-to-cool steel */
  .gunmetal {
    background: linear-gradient(180deg, #2c2c30 0%, #1a1a1e 30%, #18181c 70%, #222226 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -1px 0 rgba(0,0,0,0.3);
  }

  /* 6. Diamond plate — repeating raised dots */
  .diamond-plate {
    background:
      radial-gradient(circle at 4px 4px, rgba(255,255,255,0.05) 1.5px, transparent 1.5px),
      radial-gradient(circle at 12px 12px, rgba(255,255,255,0.05) 1.5px, transparent 1.5px),
      linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
    background-size: 16px 16px, 16px 16px, 100% 100%;
  }

  /* 7. Perforated — tiny holes pattern */
  .perforated {
    background:
      radial-gradient(circle at 50% 50%, rgba(0,0,0,0.4) 1.5px, transparent 1.5px),
      linear-gradient(180deg, #282828 0%, #1e1e1e 100%);
    background-size: 6px 6px, 100% 100%;
  }

  /* 8. Layered noise + gradient — rough industrial */
  .industrial {
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/></svg>"),
      linear-gradient(180deg, #282828 0%, #1a1a1a 50%, #202020 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -1px 0 rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
  <h2>1. Brushed Metal</h2>
  <div class="swatch brushed-metal">SCOREBOARD</div>

  <h2>2. Carbon Fiber</h2>
  <div class="swatch carbon-fiber">SCOREBOARD</div>

  <h2>3. Stamped / Embossed Metal</h2>
  <div class="swatch stamped-metal">SCOREBOARD</div>

  <h2>4. Dark Glass</h2>
  <div class="swatch dark-glass">SCOREBOARD</div>

  <h2>5. Gunmetal Gradient</h2>
  <div class="swatch gunmetal">SCOREBOARD</div>

  <h2>6. Diamond Plate</h2>
  <div class="swatch diamond-plate">SCOREBOARD</div>

  <h2>7. Perforated Metal</h2>
  <div class="swatch perforated">SCOREBOARD</div>

  <h2>8. Industrial Noise</h2>
  <div class="swatch industrial">SCOREBOARD</div>
</body>
</html>
