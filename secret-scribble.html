<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Scribble — Prototype</title>
<link rel="stylesheet" href="https://use.typekit.net/lps4irc.css">
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
<style>
  :root {
    --red-bg: #990b0b;
    --red-text: #ff5555;
    --blue-bg: #053977;
    --blue-text: #4c8cff;
    --surface: #1a1a1a;
    --surface-light: #2a2a2a;
    --text: #e0e0e0;
    --gold: #fba300;
    --danger: #ff4444;
    --easy: #44cc44;
    --medium: #4c8cff;
    --hard: #fb8c00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: var(--text);
    font-family: "futura-100", "Helvetica Neue", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    font-family: "Bitcount Single", monospace;
    font-size: 2.4rem;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── Word Selection Screen ── */
  #word-select-screen {
    gap: 20px;
    min-width: 500px;
  }

  .word-select-title {
    font-family: "Bitcount Single", monospace;
    font-size: 1.6rem;
    color: var(--gold);
  }

  .word-select-timer {
    font-family: "Bitcount Single", monospace;
    font-size: 2.4rem;
    color: var(--text);
  }

  .word-select-timer.urgent { color: var(--danger); }

  .word-choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .word-choice {
    padding: 14px 20px;
    border: 2px solid #444;
    border-radius: 10px;
    background: var(--surface);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }

  .word-choice:hover { border-color: #888; background: #252525; transform: scale(1.02); }

  .word-choice .word-text {
    font-family: "Bitcount Single", monospace;
    font-size: 1.8rem;
    text-transform: uppercase;
  }

  .word-choice .word-meta {
    text-align: right;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .word-choice .word-pts {
    font-family: "Bitcount Single", monospace;
    font-size: 1.2rem;
  }

  .word-choice.easy .word-text { color: var(--easy); }
  .word-choice.easy { border-color: rgba(68,204,68,0.3); }
  .word-choice.medium .word-text { color: var(--medium); }
  .word-choice.medium { border-color: rgba(76,140,255,0.3); }
  .word-choice.hard .word-text { color: var(--hard); }
  .word-choice.hard { border-color: rgba(251,140,0,0.3); }

  .word-waiting {
    font-family: "Bitcount Single", monospace;
    font-size: 1.2rem;
    color: #666;
    margin-top: 8px;
  }

  /* ── Countdown Overlay ── */
  .countdown-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    border-radius: 8px;
    pointer-events: none;
  }

  .countdown-text {
    font-family: "Bitcount Single", monospace;
    font-size: 4rem;
    color: var(--gold);
    animation: countdown-pop 0.8s ease-out;
  }

  @keyframes countdown-pop {
    0% { transform: scale(2); opacity: 0; }
    30% { transform: scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── Game screen ── */
  #game-screen { gap: 12px; }

  .game-area {
    display: flex;
    gap: 24px;
    margin-bottom: 8px;
  }

  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .panel-label {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
  }

  .panel-label .team-tag { font-weight: 700; }
  .panel-label .team-tag.red { color: var(--red-text); }
  .panel-label .team-tag.blue { color: var(--blue-text); }

  /* Canvas styling */
  canvas {
    border-radius: 8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.3);
    cursor: crosshair;
    display: block;
  }

  #opponent-canvas { cursor: default; }

  .canvas-wrap {
    position: relative;
    width: 480px;
  }

  .canvas-edge-tools {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    padding: 5px 8px;
    background: rgba(17,17,17,0.85);
    backdrop-filter: blur(6px);
    border-radius: 0 0 8px 8px;
    margin-top: -4px;
    position: relative;
    z-index: 2;
  }

  .edge-divider {
    width: 1px;
    height: 22px;
    background: #444;
    margin: 0 3px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    max-width: 480px;
  }

  .toolbar-group {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 8px;
    background: var(--surface);
    border-radius: 8px;
  }

  .toolbar-group label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-right: 4px;
  }

  .tool-btn-sm {
    width: 28px;
    height: 28px;
    border: 2px solid #444;
    border-radius: 5px;
    background: var(--surface-light);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: border-color 0.15s, background 0.15s;
  }

  .tool-btn-sm:hover { border-color: #888; }

  .edge-text-btn {
    padding: 2px 8px;
    border: 2px solid #444;
    border-radius: 5px;
    background: var(--surface-light);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.6;
  }

  .edge-text-btn:hover { border-color: #888; background: #333; }
  .edge-text-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #333; }

  .size-btn {
    width: 36px;
    height: 36px;
    border: 2px solid #444;
    border-radius: 6px;
    background: var(--surface-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .size-btn:hover { border-color: #888; }
  .size-btn.active { border-color: var(--gold); background: #3a2a00; }

  .size-dot { border-radius: 50%; background: var(--text); }

  .eraser-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #f49898; display: flex; align-items: center;
    justify-content: center; position: relative;
  }
  .eraser-dot::after {
    content: "\2715"; font-size: 0.65rem; font-weight: 700;
    color: var(--danger); line-height: 1;
  }

  .color-btn {
    width: 24px; height: 24px; border: 2px solid #444;
    border-radius: 50%; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.3); }

  /* Opponent view wrapper */
  .opponent-wrap {
    position: relative;
    width: 480px; height: 480px;
    border-radius: 8px; overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.3);
  }
  .opponent-wrap canvas { box-shadow: none; border-radius: 0; }

  .tile-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    pointer-events: none;
  }
  .grid-tile {
    background: #222; border: 1px solid rgba(255,255,255,0.06);
    transform-style: preserve-3d;
  }
  .grid-tile.revealed { animation: tile-flip 0.5s ease-in forwards; }
  .grid-tile.revealed-instant { opacity: 0; }

  @keyframes tile-flip {
    0%   { transform: perspective(600px) rotateY(0deg); opacity: 1; }
    40%  { transform: perspective(600px) rotateY(95deg); opacity: 1; }
    50%  { transform: perspective(600px) rotateY(95deg); opacity: 0.6; }
    100% { transform: perspective(600px) rotateY(180deg); opacity: 0; }
  }

  /* Canvas solved overlay */
  .solved-overlay {
    position: absolute; inset: 0;
    background: rgba(68,204,68,0.15);
    border: 3px solid var(--easy);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 60;
    animation: solved-flash 0.6s ease-out;
  }
  .solved-overlay span {
    font-family: "Bitcount Single", monospace;
    font-size: 2.5rem; color: var(--easy);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  @keyframes solved-flash {
    0% { background: rgba(68,204,68,0.5); }
    100% { background: rgba(68,204,68,0.15); }
  }

  /* Guess area */
  .guess-area { display: flex; gap: 8px; width: 100%; max-width: 992px; }
  .guess-input {
    flex: 1; padding: 8px 14px; border: 2px solid #444; border-radius: 6px;
    background: var(--surface); color: var(--text); font-family: inherit;
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .guess-input:focus { border-color: var(--gold); }
  .guess-input.flash-wrong { border-color: var(--danger); background: #331111; }
  .guess-input.flash-correct { border-color: #44ff44; background: #113311; }
  .guess-input:disabled { opacity: 0.5; cursor: not-allowed; }

  .guess-submit {
    padding: 8px 20px; border: 2px solid var(--gold); border-radius: 6px;
    background: #3a2a00; color: var(--gold); cursor: pointer;
    font-family: inherit; font-size: 1rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .guess-submit:hover { background: #4a3500; }
  .guess-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Word display for drawer */
  .drawer-word {
    font-family: "Bitcount Single", monospace;
    font-size: 1.4rem;
    padding: 6px 16px;
    border-radius: 8px;
    background: var(--surface);
    min-width: 200px;
    text-align: center;
  }
  .drawer-word.easy { color: var(--easy); border: 1px solid rgba(68,204,68,0.3); }
  .drawer-word.medium { color: var(--medium); border: 1px solid rgba(76,140,255,0.3); }
  .drawer-word.hard { color: var(--hard); border: 1px solid rgba(251,140,0,0.3); }

  /* Timer bar between panels */
  .game-timer {
    font-family: "Bitcount Single", monospace;
    font-size: 2rem; color: var(--gold);
    text-align: center; margin-bottom: 4px;
  }
  .game-timer.warning { color: var(--danger); animation: pulse 0.5s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .status-msg {
    font-family: "Bitcount Single", monospace;
    font-size: 1.2rem; min-height: 1.4rem;
    text-align: center;
  }
  .status-msg.correct { color: #44ff44; }
  .status-msg.timeup { color: var(--danger); }

  /* ── Summary Screen ── */
  #summary-screen { gap: 20px; min-width: 500px; }

  .summary-title {
    font-family: "Bitcount Single", monospace;
    font-size: 2rem; color: var(--gold);
  }

  .summary-sessions { width: 100%; }

  .summary-session {
    padding: 12px 16px; margin-bottom: 8px;
    background: var(--surface); border-radius: 8px;
  }

  .summary-session h3 {
    font-size: 0.85rem; text-transform: uppercase;
    letter-spacing: 1px; color: #888; margin-bottom: 8px;
  }

  .summary-row {
    display: flex; justify-content: space-between;
    padding: 4px 0; font-size: 0.9rem;
  }

  .summary-row .pts { font-family: "Bitcount Single", monospace; font-size: 1.1rem; }
  .summary-row .pts.red { color: var(--red-text); }
  .summary-row .pts.blue { color: var(--blue-text); }

  .summary-totals {
    display: flex; gap: 32px; justify-content: center;
    padding: 16px; background: var(--surface); border-radius: 10px;
  }

  .summary-team {
    text-align: center;
  }

  .summary-team-name {
    font-size: 0.85rem; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .summary-team-name.red { color: var(--red-text); }
  .summary-team-name.blue { color: var(--blue-text); }

  .summary-team-score {
    font-family: "Bitcount Single", monospace;
    font-size: 2.4rem; color: var(--gold);
  }

  .action-btn {
    padding: 8px 20px; border: 2px solid #444; border-radius: 6px;
    background: var(--surface-light); color: var(--text); cursor: pointer;
    font-family: inherit; font-size: 0.9rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .action-btn:hover { border-color: #888; background: #333; }

  /* Brush menu */
  .brush-menu { position: fixed; display: none; z-index: 9999; }
  .brush-menu.open { display: block; }
  .brush-menu-ring { position: relative; width: 120px; height: 120px; }
  .brush-menu-item {
    position: absolute; width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 2px solid #555; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.12s, transform 0.12s, background 0.12s;
  }
  .brush-menu-item:hover { border-color: var(--gold); transform: scale(1.15); background: #3a2a00; }
  .brush-menu-item.active { border-color: var(--gold); background: #3a2a00; }
  .brush-menu-dot { border-radius: 50%; background: var(--text); }
  .brush-menu-item.eraser-item { font-size: 1.1rem; color: var(--text); }

  #draw-canvas.disabled { cursor: not-allowed !important; opacity: 0.7; }
</style>
</head>
<body>

<h1>Secret Scribble</h1>

<!-- ── Word Selection Screen ── -->
<div class="screen active" id="word-select-screen">
  <div class="word-select-title">Choose Your Word</div>
  <div class="word-select-timer" id="ws-timer">10</div>
  <div class="word-choices" id="ws-choices"></div>
  <div class="word-waiting" id="ws-waiting" style="display:none;">Waiting for other drawer...</div>
</div>

<!-- ── Game Screen ── -->
<div class="screen" id="game-screen">
  <div class="game-timer" id="game-timer">0:40</div>
  <div class="game-area">
    <!-- Drawer / teammate canvas -->
    <div class="panel" id="draw-panel">
      <div class="panel-label" id="draw-label">Your Drawing</div>
      <div class="canvas-wrap">
        <canvas id="draw-canvas" width="480" height="480"></canvas>
        <div class="canvas-edge-tools">
          <button class="color-btn active" data-color="#111111" style="background:#111111;" title="Black"></button>
          <button class="color-btn" data-color="#ffffff" style="background:#ffffff;" title="White"></button>
          <button class="color-btn" data-color="#c00000" style="background:#c00000;" title="Red"></button>
          <button class="color-btn" data-color="#c0c000" style="background:#c0c000;" title="Yellow"></button>
          <button class="color-btn" data-color="#00c000" style="background:#00c000;" title="Green"></button>
          <button class="color-btn" data-color="#00c0c0" style="background:#00c0c0;" title="Cyan"></button>
          <button class="color-btn" data-color="#0000c0" style="background:#0000c0;" title="Blue"></button>
          <button class="color-btn" data-color="#c000c0" style="background:#c000c0;" title="Magenta"></button>
          <span class="edge-divider"></span>
          <button class="tool-btn-sm" id="bucket-btn" title="Paint Bucket">&#9783;</button>
          <span class="edge-divider"></span>
          <button class="edge-text-btn" id="clear-btn" title="Clear Canvas">CLEAR</button>
          <button class="edge-text-btn" id="undo-btn" title="Undo (Ctrl+Z)" disabled>UNDO</button>
        </div>
      </div>
      <div class="toolbar" id="draw-toolbar">
        <div class="toolbar-group">
          <label>Brush</label>
          <button class="size-btn" data-size="3" title="Small"><span class="size-dot" style="width:6px;height:6px;"></span></button>
          <button class="size-btn active" data-size="8" title="Medium"><span class="size-dot" style="width:12px;height:12px;"></span></button>
          <button class="size-btn" data-size="16" title="Large"><span class="size-dot" style="width:20px;height:20px;"></span></button>
          <button class="size-btn eraser-btn-styled" id="eraser-btn" title="Eraser"><span class="eraser-dot"></span></button>
        </div>
      </div>
      <div class="drawer-word" id="drawer-word" style="display:none;"></div>
    </div>

    <!-- Opponent canvas -->
    <div class="panel" id="opp-panel">
      <div class="panel-label" id="opp-label">Opponent Drawing</div>
      <div class="opponent-wrap" id="opponent-wrap">
        <canvas id="opponent-canvas" width="480" height="480"></canvas>
        <div class="tile-grid" id="tile-grid"></div>
      </div>
    </div>
  </div>

  <div class="guess-area" id="guess-area">
    <input type="text" class="guess-input" id="guess-input" placeholder="Type your guess..." maxlength="40">
    <button class="guess-submit" id="guess-btn">Guess</button>
  </div>
  <div class="status-msg" id="status-msg"></div>
</div>

<!-- ── Summary Screen ── -->
<div class="screen" id="summary-screen">
  <div class="summary-title">Round Complete!</div>
  <div class="summary-sessions" id="summary-body"></div>
  <div class="summary-totals" id="summary-totals"></div>
  <button class="action-btn" id="summary-done-btn">Play Again</button>
</div>

<!-- Brush menu -->
<div class="brush-menu" id="brush-menu">
  <div class="brush-menu-ring">
    <button class="brush-menu-item" data-action="size" data-size="3" title="Small" style="top:0;left:40px;"><span class="brush-menu-dot" style="width:6px;height:6px;"></span></button>
    <button class="brush-menu-item" data-action="size" data-size="8" title="Medium" style="top:40px;left:80px;"><span class="brush-menu-dot" style="width:12px;height:12px;"></span></button>
    <button class="brush-menu-item" data-action="size" data-size="16" title="Large" style="top:80px;left:40px;"><span class="brush-menu-dot" style="width:20px;height:20px;"></span></button>
    <button class="brush-menu-item eraser-item" data-action="eraser" title="Eraser" style="top:40px;left:0;">&#9746;</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// WORD BANK — will be replaced by CSV loader
// ══════════════════════════════════════════════════════════
const WORD_BANK = {
  easy: [
    "sun", "tree", "cat", "dog", "house", "ball", "fish", "car", "hat", "star",
    "moon", "book", "cup", "boat", "key", "bird", "apple", "heart", "chair", "clock"
  ],
  medium: [
    "guitar", "volcano", "surfing", "snowman", "penguin", "campfire", "basketball",
    "rainbow", "waterfall", "pizza", "castle", "anchor", "crown", "telescope",
    "lighthouse", "sunflower", "submarine", "butterfly", "robot", "scarecrow"
  ],
  hard: [
    "astronaut", "birthday cake", "roller coaster", "pirate ship", "treasure chest",
    "hot air balloon", "skyscraper", "fireworks", "helicopter", "treehouse",
    "mermaid", "tornado", "octopus", "spaceship", "dinosaur", "wizard", "igloo",
    "cowboy", "dragon", "scarecrow"
  ]
};

const DIFFICULTY_POINTS = { easy: 50, medium: 75, hard: 100 };
const DIFFICULTY_COLORS = { easy: "var(--easy)", medium: "var(--medium)", hard: "var(--hard)" };

// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const CANVAS_SIZE = 480;
const GRID_SIZE = 4;
const TILE_SIZE = CANVAS_SIZE / GRID_SIZE;
const DRAW_DURATION = 60;
const REVEAL_INTERVAL = 4; // seconds between tile reveals (tuned for 60s)
const WORD_SELECT_TIME = 10;
const COUNTDOWN_BEATS = ["Ready", "Set", "Draw!"];

// Multiplier brackets: [minSecondsRemaining, multiplier]
const TIME_MULTIPLIERS = [
  [46, 3.0],   // first 15 seconds (60-46)
  [31, 2.0],   // 16-30 seconds
  [16, 1.5],   // 31-45 seconds
  [0,  1.0],   // remainder
];

function getTimeMultiplier(secondsRemaining) {
  for (const [minSec, mult] of TIME_MULTIPLIERS) {
    if (secondsRemaining >= minSec) return mult;
  }
  return 1.0;
}

// ══════════════════════════════════════════════════════════
// SIMULATED PLAYERS (2v2 prototype)
// ══════════════════════════════════════════════════════════
const PLAYERS = [
  { name: "You",      team: 0 },  // Red team
  { name: "Teammate",  team: 0 },  // Red team
  { name: "Rival 1",   team: 1 },  // Blue team
  { name: "Rival 2",   team: 1 },  // Blue team
];

// ══════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════
let gamePhase = "idle"; // idle | word-select | countdown | drawing | session-end | summary
let currentSession = 0; // 0 = first pair draws, 1 = second pair draws
const sessions = []; // [{drawer1, drawer2, word1, word2, diff1, diff2, scores: {...}}]
let usedWords = new Set();

// Per-session state
let sessionTimer = DRAW_DURATION;
let sessionInterval = null;
let revealTimer = null;
let revealedTiles = new Set();
let renderLoopId = null;
let tileElements = [];

function buildTileGrid() {
  tileGrid.innerHTML = "";
  tileElements = [];
  for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
    const tile = document.createElement("div");
    tile.className = "grid-tile";
    tileGrid.appendChild(tile);
    tileElements.push(tile);
  }
}
function resetTileGrid() {
  revealedTiles = new Set();
  tileElements.forEach(t => t.className = "grid-tile");
}
function revealRandomTile() {
  const unrevealed = [];
  for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
    if (!revealedTiles.has(i)) unrevealed.push(i);
  }
  if (unrevealed.length === 0) return;
  const pick = unrevealed[Math.floor(Math.random() * unrevealed.length)];
  revealedTiles.add(pick);
  tileElements[pick].classList.add("revealed");
}
function revealAllTiles() {
  for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
    if (!revealedTiles.has(i)) {
      revealedTiles.add(i);
      tileElements[i].classList.add("revealed-instant");
    }
  }
}

function clearDrawCanvas() {

}

  oppCtx.fillStyle = "#ffffff";

}

const cursorCanvas = document.createElement("canvas");
const cursorCtx = cursorCanvas.getContext("2d");
function updateCursor() {
  if (!drawingEnabled) return;
  const rect = drawCanvas.getBoundingClientRect();
  const ds = Math.max(currentSize * (rect.width / CANVAS_SIZE), 4);
  const full = Math.ceil(ds + 4);
  cursorCanvas.width = full; cursorCanvas.height = full;
  const cx = full / 2;
  cursorCtx.clearRect(0, 0, full, full);
  if (currentTool === "eraser") {
    cursorCtx.beginPath(); cursorCtx.arc(cx, cx, ds/2, 0, Math.PI*2);
    cursorCtx.strokeStyle = "rgba(0,0,0,0.6)"; cursorCtx.lineWidth = 1.5;
    cursorCtx.setLineDash([3,3]); cursorCtx.stroke(); cursorCtx.setLineDash([]);
  } else if (currentTool === "bucket") {
    drawCanvas.style.cursor = "crosshair"; return;
  } else {
    cursorCtx.beginPath(); cursorCtx.arc(cx, cx, ds/2, 0, Math.PI*2);
    cursorCtx.fillStyle = currentColor; cursorCtx.fill();
    cursorCtx.strokeStyle = "rgba(128,128,128,0.5)"; cursorCtx.lineWidth = 1; cursorCtx.stroke();
  }
  const half = Math.round(full/2);
  drawCanvas.style.cursor = `url(${cursorCanvas.toDataURL()}) ${half} ${half}, crosshair`;
}

function saveUndoSnapshot() {
  undoStack.push(drawCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE));
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  undoBtn.disabled = false;
}
function undo() {
  if (!undoStack.length || !drawingEnabled) return;
  drawCtx.putImageData(undoStack.pop(), 0, 0);
  undoBtn.disabled = undoStack.length === 0;
}

// Flood fill (same scanline algo as before)
function floodFill(sx, sy, fillColor) {
  const id = drawCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  const d = id.data, w = CANVAS_SIZE, h = CANVAS_SIZE;
  const tmp = document.createElement("div"); tmp.style.color = fillColor;
  document.body.appendChild(tmp);
  const rgb = getComputedStyle(tmp).color.match(/\d+/g).map(Number);
  document.body.removeChild(tmp);
  const [fR, fG, fB] = rgb;
  const fx = Math.floor(sx), fy = Math.floor(sy);
  if (fx < 0 || fx >= w || fy < 0 || fy >= h) return;
  const i0 = (fy*w+fx)*4;
  const [tR, tG, tB, tA] = [d[i0], d[i0+1], d[i0+2], d[i0+3]];
  if (tR===fR && tG===fG && tB===fB && tA===255) return;
  const tol = 30;
  const m = i => Math.abs(d[i]-tR)<=tol && Math.abs(d[i+1]-tG)<=tol && Math.abs(d[i+2]-tB)<=tol && Math.abs(d[i+3]-tA)<=tol;
  const s = i => { d[i]=fR; d[i+1]=fG; d[i+2]=fB; d[i+3]=255; };
  const stk = [[fx,fy]], vis = new Uint8Array(w*h);
  while (stk.length) {
    let [x,y] = stk.pop();
    if (vis[y*w+x]) continue;
    while (x>0 && m((y*w+x-1)*4)) x--;
    let sa=false, sb=false;
    while (x<w) {
      const ci=(y*w+x)*4;
      if (!m(ci)) break;
      s(ci); vis[y*w+x]=1;
      if (y>0) { const ai=((y-1)*w+x)*4; if (m(ai)&&!vis[(y-1)*w+x]) { if(!sa){stk.push([x,y-1]);sa=true;} } else sa=false; }
      if (y<h-1) { const bi=((y+1)*w+x)*4; if (m(bi)&&!vis[(y+1)*w+x]) { if(!sb){stk.push([x,y+1]);sb=true;} } else sb=false; }
      x++;
    }
  }
  drawCtx.putImageData(id, 0, 0);
}

function getCanvasPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  return { x: (e.clientX-r.left)*(CANVAS_SIZE/r.width), y: (e.clientY-r.top)*(CANVAS_SIZE/r.height) };
}
function startStroke(e) {
  if (!drawingEnabled) return;
  const p = getCanvasPos(e);
  if (currentTool === "bucket") { saveUndoSnapshot(); floodFill(p.x, p.y, currentColor); return; }
  isDrawing = true; saveUndoSnapshot();
  lastX = p.x; lastY = p.y;
  drawCtx.beginPath(); drawCtx.arc(p.x, p.y, currentSize/2, 0, Math.PI*2);
  drawCtx.fillStyle = currentTool==="eraser" ? "#ffffff" : currentColor; drawCtx.fill();
}
function drawStroke(e) {
  if (!isDrawing || !drawingEnabled) return;
  const p = getCanvasPos(e);
  drawCtx.beginPath(); drawCtx.moveTo(lastX, lastY); drawCtx.lineTo(p.x, p.y);
  drawCtx.strokeStyle = currentTool==="eraser" ? "#ffffff" : currentColor;
  drawCtx.lineWidth = currentSize; drawCtx.lineCap = "round"; drawCtx.lineJoin = "round";
  drawCtx.stroke(); lastX = p.x; lastY = p.y;
}
function endStroke() { isDrawing = false; }

drawCanvas.addEventListener("pointerdown", startStroke);
drawCanvas.addEventListener("pointermove", drawStroke);
drawCanvas.addEventListener("pointerup", endStroke);
drawCanvas.addEventListener("pointerleave", endStroke);

function startAutoScribble() {
  const colors = ["#111111","#c00000","#0000c0","#00c000","#c000c0","#c0c000"];
  let ax = 240, ay = 240;
  autoScribbleInterval = setInterval(() => {
    autoCtx.beginPath();
    autoCtx.strokeStyle = colors[Math.floor(Math.random()*colors.length)];
    autoCtx.lineWidth = 3 + Math.random()*12;
    autoCtx.lineCap = "round";
    const nx = ax + (Math.random()-0.5)*80;
    const ny = ay + (Math.random()-0.5)*80;
    autoCtx.moveTo(ax, ay);
    autoCtx.lineTo(Math.max(10,Math.min(470,nx)), Math.max(10,Math.min(470,ny)));
    autoCtx.stroke();
    ax = Math.max(10,Math.min(470,nx));
    ay = Math.max(10,Math.min(470,ny));
  }, 200);
}
function stopAutoScribble() {
  clearInterval(autoScribbleInterval); autoScribbleInterval = null;
}

// ══════════════════════════════════════════════════════════
// WORD SELECTION
// ══════════════════════════════════════════════════════════
function pickRandomWord(difficulty) {
  const pool = WORD_BANK[difficulty].filter(w => !usedWords.has(w));
  if (pool.length === 0) return WORD_BANK[difficulty][Math.floor(Math.random()*WORD_BANK[difficulty].length)];
  const word = pool[Math.floor(Math.random()*pool.length)];
  return word;
}

function startWordSelection(onComplete) {
  gamePhase = "word-select";
  showScreen("wordSelect");
  wsWaiting.style.display = "none";

  const choices = [
    { word: pickRandomWord("easy"), difficulty: "easy", points: 50 },
    { word: pickRandomWord("medium"), difficulty: "medium", points: 75 },
    { word: pickRandomWord("hard"), difficulty: "hard", points: 100 },
  ];

  wsChoices.innerHTML = "";
  choices.forEach(c => {
    const div = document.createElement("div");
    div.className = `word-choice ${c.difficulty}`;
    div.innerHTML = `
      <span class="word-text">${c.word.toUpperCase()}</span>
      <div>
        <div class="word-meta">${c.difficulty}</div>
        <div class="word-pts">${c.points} pts</div>
      </div>`;
    div.addEventListener("click", () => {
      usedWords.add(c.word);
      wsChoices.querySelectorAll(".word-choice").forEach(d => d.style.pointerEvents = "none");
      div.style.border = "2px solid var(--gold)";
      div.style.background = "#2a2000";
      wsWaiting.style.display = "";
      clearInterval(wsCountdown);
      // Simulate opponent choosing after a random delay
      const oppChoice = choices[Math.floor(Math.random()*3)];
      const oppWord = pickRandomWord(oppChoice.difficulty);
      usedWords.add(oppWord);
      setTimeout(() => onComplete(c.word, c.difficulty, c.points, oppWord, oppChoice.difficulty, oppChoice.points), 800 + Math.random()*1500);
    });
    wsChoices.appendChild(div);
  });

  // Timer
  let timeLeft = WORD_SELECT_TIME;
  wsTimer.textContent = timeLeft;
  wsTimer.classList.remove("urgent");
  const wsCountdown = setInterval(() => {
    timeLeft--;
    wsTimer.textContent = timeLeft;
    if (timeLeft <= 3) wsTimer.classList.add("urgent");
    if (timeLeft <= 0) {
      clearInterval(wsCountdown);
      // Auto-pick random
      const pick = choices[Math.floor(Math.random()*3)];
      usedWords.add(pick.word);
      const oppChoice = choices[Math.floor(Math.random()*3)];
      const oppWord = pickRandomWord(oppChoice.difficulty);
      usedWords.add(oppWord);
      onComplete(pick.word, pick.difficulty, pick.points, oppWord, oppChoice.difficulty, oppChoice.points);
    }
  }, 1000);
}

// ══════════════════════════════════════════════════════════
// COUNTDOWN ("Ready, Set, Draw!")
// ══════════════════════════════════════════════════════════
function playCountdown(canvasWrap, onDone) {
  gamePhase = "countdown";
  let beat = 0;
  const overlay = document.createElement("div");
  overlay.className = "countdown-overlay";
  canvasWrap.appendChild(overlay);

  function nextBeat() {
    if (beat >= COUNTDOWN_BEATS.length) {
      overlay.remove();
      onDone();
      return;
    }
    overlay.innerHTML = `<span class="countdown-text" style="animation:countdown-pop 0.8s ease-out">${COUNTDOWN_BEATS[beat]}</span>`;
    beat++;
    setTimeout(nextBeat, 900);
  }
  nextBeat();
}

// ══════════════════════════════════════════════════════════
// SCORING ENGINE
// ══════════════════════════════════════════════════════════
function initSessionScoring() {
  return {
    teammateSolved: false,
    opponentSolved: false,
    firstGuessClaimed: false,
    firstDrawingClaimed: false, // per-canvas: {0: false, 1: false}
    drawingFirstClaimed: [false, false], // which canvas was guessed first
    events: [],
    teamScores: [0, 0], // [red, blue]
  };
}

function scoreGuess(guesserTeam, canvasIdx, secondsRemaining, wordPoints) {
  const ss = sessionScoring;
  const mult = getTimeMultiplier(secondsRemaining);
  const isSteal = (canvasIdx === 1); // canvas 1 = opponent
  let raw = wordPoints;
  const breakdown = [`${wordPoints} (word)`];

  // First correct guess bonus
  if (!ss.firstGuessClaimed) {
    ss.firstGuessClaimed = true;
    raw += 50;
    breakdown.push("+50 (first guess)");
  }

  // Steal bonus
  if (isSteal) {
    raw += 50;
    breakdown.push("+50 (steal)");
  }

  const total = Math.round(raw * mult);
  ss.events.push({
    type: "guess", team: guesserTeam, canvas: canvasIdx, raw, mult, total,
    breakdown: breakdown.join(" ") + ` x${mult}`,
    secondsRemaining,
  });
  ss.teamScores[guesserTeam] += total;

  // First drawing guessed bonus — goes to the DRAWER
  if (!ss.drawingFirstClaimed[canvasIdx]) {
    ss.drawingFirstClaimed[canvasIdx] = true;
    const drawerTeam = canvasIdx === 0 ? 0 : 1; // canvas 0 = your team, canvas 1 = opponent
    const drawerBonus = Math.round(50 * mult);
    ss.events.push({
      type: "drawer-bonus", team: drawerTeam, canvas: canvasIdx,
      raw: 50, mult, total: drawerBonus,
      breakdown: `50 (first drawing guessed) x${mult}`,
      secondsRemaining,
    });
    ss.teamScores[drawerTeam] += drawerBonus;
  }

  return { total, mult, breakdown };
}

// ══════════════════════════════════════════════════════════
// DRAWING SESSION
// ══════════════════════════════════════════════════════════
function startDrawingSession(myWord, myDiff, myPts, oppWord, oppDiff, oppPts) {
  showScreen("game");
  gamePhase = "drawing";

  // Reset drawing tools to defaults
  currentTool = "brush";
  currentColor = "#111111";
  currentSize = 8;
  colorBtns.forEach(b => b.classList.remove("active"));
  document.querySelector('.color-btn[data-color="#111111"]').classList.add("active");
  brushGroup.forEach(b => b.classList.remove("active"));
  document.querySelector('.size-btn[data-size="8"]').classList.add("active");

  // Reset canvases
  clearDrawCanvas();
  clearOppCanvas();
  resetTileGrid();
  undoStack = []; undoBtn.disabled = true;

  // Set up labels
  drawLabel.innerHTML = `Your Drawing <span class="team-tag red">(Red)</span>`;
  oppLabel.innerHTML = `Opponent <span class="team-tag blue">(Blue)</span>`;

  // Show drawer's word
  drawerWordEl.style.display = "";
  drawerWordEl.textContent = myWord.toUpperCase();
  drawerWordEl.className = `drawer-word ${myDiff}`;

  // Show drawing tools
  drawToolbar.style.display = "";
  document.querySelector(".canvas-edge-tools").style.display = "";

  // Show guess area
  guessArea.style.display = "";
  guessInput.disabled = false;
  guessBtn.disabled = false;
  guessInput.value = "";
  guessInput.placeholder = "Type your guess for either drawing...";
  statusMsg.textContent = "";
  statusMsg.className = "status-msg";

  // Init scoring
  sessionScoring = initSessionScoring();
  let teammateSolved = false;
  let opponentSolved = false;

  // Store session data
  const sessionData = {
    myWord, myDiff, myPts, oppWord, oppDiff, oppPts,
    scoring: sessionScoring,
  };

  // Timer
  sessionTimer = DRAW_DURATION;
  updateGameTimer();

  // Enable drawing
  drawingEnabled = true;
  drawCanvas.classList.remove("disabled");
  updateCursor();

  // Start auto-scribbler for opponent
  initAutoScribbler();
  startAutoScribble();
  renderAutoOpponent();

  // Start timers
  sessionInterval = setInterval(() => {
    sessionTimer--;
    updateGameTimer();
    if (sessionTimer <= 0) endDrawingSession("timeup", sessionData);
  }, 1000);

  revealTimer = setInterval(revealRandomTile, REVEAL_INTERVAL * 1000);

  // Guess handler
  const handleGuess = () => {
    const guess = guessInput.value.trim().toLowerCase();
    if (!guess) return;

    // Check teammate's drawing (canvas 0)
    if (!teammateSolved && guess === myWord.toLowerCase()) {
      // Wait — in this prototype, YOU are the drawer AND guesser for testing.
      // Teammate canvas = your drawing. But since you know the word, let's
      // treat canvas 0 as the "teammate" canvas the guesser would see.
      // For standalone testing: canvas 0 = auto-scribble, canvas 1 = your drawing behind tiles.
      // Actually let's keep it simple: you guess both words from the guess box.
    }

    let matched = false;

    // Check word 1 (teammate's drawing — the one you can see clearly)
    if (!teammateSolved && guess === myWord.toLowerCase()) {
      teammateSolved = true;
      const result = scoreGuess(0, 0, sessionTimer, myPts);
      showCanvasSolved("draw-panel", myWord);
      statusMsg.textContent = `Correct! ${myWord.toUpperCase()} — ${result.total} pts (${result.mult}x)`;
      statusMsg.className = "status-msg correct";
      matched = true;
    }

    // Check word 2 (opponent's drawing — behind tiles)
    if (!matched && !opponentSolved && guess === oppWord.toLowerCase()) {
      opponentSolved = true;
      const result = scoreGuess(0, 1, sessionTimer, oppPts);
      showCanvasSolved("opp-panel", oppWord);
      revealAllTiles();
      statusMsg.textContent = `Steal! ${oppWord.toUpperCase()} — ${result.total} pts (${result.mult}x)`;
      statusMsg.className = "status-msg correct";
      matched = true;
    }

    if (!matched) {
      guessInput.classList.add("flash-wrong");
      setTimeout(() => guessInput.classList.remove("flash-wrong"), 400);
    }

    guessInput.value = "";
    guessInput.focus();

    // Both solved — end early
    if (teammateSolved && opponentSolved) {
      endDrawingSession("all-solved", sessionData);
    }
  };

  guessBtn.onclick = handleGuess;
  guessInput.onkeydown = e => { if (e.key === "Enter") handleGuess(); };

  // Countdown first
  drawingEnabled = false;
  drawCanvas.classList.add("disabled");
  playCountdown(document.querySelector(".canvas-wrap"), () => {
    gamePhase = "drawing";
    drawingEnabled = true;
    drawCanvas.classList.remove("disabled");
    updateCursor();
  });
}

function showCanvasSolved(panelId, word) {
  const panel = document.getElementById(panelId);
  const wrap = panel.querySelector(".canvas-wrap, .opponent-wrap");
  if (!wrap) return;
  const overlay = document.createElement("div");
  overlay.className = "solved-overlay";
  overlay.innerHTML = `<span>SOLVED!</span>`;
  wrap.appendChild(overlay);
}

function updateGameTimer() {
  const m = Math.floor(sessionTimer / 60);
  const s = sessionTimer % 60;
  gameTimerEl.textContent = `${m}:${s.toString().padStart(2,"0")}`;
  if (sessionTimer <= 10) gameTimerEl.classList.add("warning");
  else gameTimerEl.classList.remove("warning");
}

function endDrawingSession(reason, sessionData) {
  if (gamePhase === "session-end" || gamePhase === "summary") return; // guard against double-calls
  gamePhase = "session-end";
  clearInterval(sessionInterval); sessionInterval = null;
  clearInterval(revealTimer); revealTimer = null;
  stopAutoScribble();
  if (renderLoopId) { cancelAnimationFrame(renderLoopId); renderLoopId = null; }

  drawingEnabled = false;
  drawCanvas.classList.add("disabled");
  guessInput.disabled = true;
  guessBtn.disabled = true;
  revealAllTiles();

  if (reason === "timeup") {
    statusMsg.textContent = "Time's up!";
    statusMsg.className = "status-msg timeup";
  } else if (reason === "all-solved") {
    statusMsg.textContent = "Both drawings solved!";
    statusMsg.className = "status-msg correct";
  }

  // Store session results
  sessions.push({
    ...sessionData,
    scores: { ...sessionScoring.teamScores },
    events: [...sessionScoring.events],
  });

  // Next session or summary
  const nextSession = currentSession + 1;
  setTimeout(() => {
    currentSession = nextSession;
    if (currentSession < 2) {
      document.querySelectorAll(".solved-overlay").forEach(el => el.remove());
      startWordSelection(startDrawingSession);
    } else {
      showSummary();
    }
  }, 2000);
}

// ══════════════════════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════════════════════
function showSummary() {
  gamePhase = "summary";
  showScreen("summary");

  let totalRed = 0, totalBlue = 0;

  summaryBody.innerHTML = "";
  sessions.forEach((s, idx) => {
    const div = document.createElement("div");
    div.className = "summary-session";
    let eventsHtml = "";
    s.events.forEach(ev => {
      const teamClass = ev.team === 0 ? "red" : "blue";
      const label = ev.type === "drawer-bonus" ? "Drawer bonus" : (ev.canvas === 1 ? "Steal guess" : "Guess");
      eventsHtml += `<div class="summary-row"><span>${label}: ${ev.breakdown}</span><span class="pts ${teamClass}">+${ev.total}</span></div>`;
    });
    if (s.events.length === 0) eventsHtml = `<div class="summary-row"><span style="color:#666;">No correct guesses</span><span></span></div>`;
    div.innerHTML = `<h3>Drawing Session ${idx+1}</h3>${eventsHtml}`;
    summaryBody.appendChild(div);
    totalRed += s.scores[0];
    totalBlue += s.scores[1];
  });

  summaryTotals.innerHTML = `
    <div class="summary-team">
      <div class="summary-team-name red">Red Team</div>
      <div class="summary-team-score">${totalRed}</div>
    </div>
    <div class="summary-team">
      <div class="summary-team-name blue">Blue Team</div>
      <div class="summary-team-score">${totalBlue}</div>
    </div>`;
}

summaryDoneBtn.addEventListener("click", () => {
  currentSession = 0;
  sessions.length = 0;
  usedWords.clear();
  document.querySelectorAll(".solved-overlay").forEach(el => el.remove());
  startWordSelection(startDrawingSession);
});

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
startWordSelection(startDrawingSession);
</script>
